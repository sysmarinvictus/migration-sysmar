# SPA + reverse proxy to the backend. The backend is reachable as host "backend" on the compose network.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Don't leak the server version.
    server_tokens off;

    # API + auth → backend (same-origin from the browser's perspective).
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
    location /auth/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Static assets — long cache (Vite fingerprints filenames).
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — every other path serves index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
