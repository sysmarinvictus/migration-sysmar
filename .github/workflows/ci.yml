name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest   # has Docker → Testcontainers works
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build & test (unit via surefire + Testcontainers IT via failsafe)
        working-directory: backend
        run: mvn -B verify
      # Parity tests run separately (need the legacy GeneXus app reachable):
      #   mvn -B -Pparity verify

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: |
          npm ci
          npm run typecheck
          npm run test
          npm run build
