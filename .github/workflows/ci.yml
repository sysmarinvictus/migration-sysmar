name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest   # has Docker → Testcontainers works
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build & test (unit via surefire + Testcontainers IT via failsafe)
        working-directory: backend
        run: mvn -B verify
      # Parity tests run separately (need the legacy GeneXus app reachable):
      #   mvn -B -Pparity verify

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: |
          npm ci
          npm run typecheck
          npm run test
          npm run build

  # Validate the production backend image builds (no push). The FRONTEND image is intentionally NOT built
  # here: it needs the generated API client (src/lib/generated/), which orval produces from a RUNNING
  # backend (gen:api) and which is git-ignored — a clean CI checkout cannot produce it without first
  # booting the backend. Build the frontend image locally after `npm run gen:api`, or wire a deterministic
  # OpenAPI spec (see DEPLOY.md follow-up) before adding it here.
  docker-build:
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: receituario-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
