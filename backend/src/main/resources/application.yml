spring:
  application:
    name: receituario-backend
  # SECURITY: no default profile. A missing SPRING_PROFILES_ACTIVE boots the SECURE path — real SAU_USU
  # auth (SauUsuUserDetailsService is @Profile("!test & !local")) and a mandatory JWT_SECRET
  # (security.jwt.secret = ${JWT_SECRET}, no fallback → fails fast). Dev/test set the profile EXPLICITLY
  # (dev-up.sh → --spring.profiles.active=local; tests → @ActiveProfiles("test")). Defaulting to 'local'
  # here would silently ship the admin/admin123 dev backdoor + dev JWT secret to any environment that
  # forgets to set the profile. Backstopped by ProductionSecurityGuard.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:}
  datasource:
    url: ${DB_URL:jdbc:postgresql://127.0.0.1:5432/saude-mandaguari}
    username: ${DB_USER:saude}
    password: ${DB_PASSWORD}          # MUST come from the environment — never committed
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
  jpa:
    open-in-view: false               # avoid lazy-loading in the view layer
    hibernate:
      ddl-auto: validate              # NEVER let Hibernate touch the existing schema; Flyway owns DDL
    properties:
      hibernate.jdbc.time_zone: America/Sao_Paulo
      # Preserve GeneXus physical table/column names exactly as written in @Table/@Column.
      # (Boot's default CamelCaseToUnderscores strategy would rewrite them — do NOT use it here.)
      hibernate.physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  flyway:
    enabled: true
    baseline-on-migrate: true         # adopt the already-populated GeneXus DB as the baseline
    baseline-version: 1
    locations: classpath:db/migration

# Stateless JWT settings (HS256). Secret MUST be supplied via env (>= 32 bytes).
security:
  jwt:
    secret: ${JWT_SECRET}
    access-token-ttl: ${JWT_ACCESS_TTL:PT30M}
    refresh-token-ttl: ${JWT_REFRESH_TTL:P7D}
    issuer: receituario-modern
  cors:
    # Comma-separated allowed origins for the SPA. Dev default; prod sets CORS_ALLOWED_ORIGINS.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  cert:
    # AES key (base64, 32 bytes) for the SAU_PRO certificate-password converter. Empty default →
    # fail-closed at use (never stores cleartext). Supply CERT_ENC_KEY in real environments.
    enc-key: ${CERT_ENC_KEY:}

# Fine-grained per-program RBAC (SAU_RBAC / pisauthorized), wired via bean `authz`.
#   shadow  — legacy coarse role still decides; the RBAC verdict is computed alongside and any
#             divergence is logged. Use this to confirm the live SAU_PRFCON/SAU_USUCON matrix is
#             populated for each program code BEFORE trusting it. Zero lock-out risk (default).
#   enforce — pure deny-by-default RBAC verdict decides (faithful to GeneXus). Flip per environment
#             only after the shadow logs show no divergence for the wired programs.
rbac:
  enforcement: ${RBAC_ENFORCEMENT:shadow}

# Audit trail (common/audit → physical SAU_LOG). Persistence is fail-safe: a SAU_LOG insert failure
# never breaks the business transaction. empresa-codigo is the tenant (OQ3); 411420 = real MunCod in
# the single-tenant parity env. default-usuario-codigo (0=system) is used when the principal is not a
# numeric user id. LGPD: no patient/professional names are ever stored.
audit:
  persist:
    enabled: ${AUDIT_PERSIST_ENABLED:true}
  empresa-codigo: ${AUDIT_EMPRESA_CODIGO:411420}
  default-usuario-codigo: ${AUDIT_DEFAULT_USUARIO_CODIGO:0}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    br.gov.mandaguari.saude: INFO
