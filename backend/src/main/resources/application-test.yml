# Integration-test profile. DB is provided by Testcontainers (see AbstractIntegrationTest), so no
# static datasource URL here. Flyway runs the baseline into the throwaway container.
spring:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    baseline-on-migrate: false   # the container DB is empty; migrate from scratch
security:
  jwt:
    secret: test-only-secret-not-used-in-prod-needs-32-bytes-min
    access-token-ttl: PT30M
    refresh-token-ttl: P7D
  cert:
    # AES-256 key (Base64 of 32 zero bytes) — TEST ONLY. The SAU_PRO certificadoSenha converter is
    # fail-closed: without a key it refuses to persist a managed Profissional whose senha column is
    # non-null (e.g. a legacy-plaintext row), which would 500 any update/delete. Production supplies
    # CERT_ENC_KEY from the environment; never a real secret here.
    enc-key: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
# Audit persists to SAU_LOG in ITs (V9 baseline creates the table). Tenant=1 in test.
audit:
  persist:
    enabled: true
  empresa-codigo: 1
  default-usuario-codigo: 0
logging:
  level:
    br.gov.mandaguari.saude: DEBUG
